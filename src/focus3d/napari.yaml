name: focus-3d
display_name: FOCUS-3D
visibility: public

contributions:
  commands:
    - id: focus-3d.get_reader
      python_name: focus3d._reader:napari_get_reader
      title: Open data with FOCUS-3D

    - id: focus-3d.write_multiple
      python_name: focus3d._writer:write_multiple
      title: Save multi-layer data with FOCUS-3D

    - id: focus-3d.write_single_image
      python_name: focus3d._writer:write_single_image
      title: Save image data with FOCUS-3D

    - id: focus-3d.make_sample_data
      python_name: focus3d._sample_data:make_sample_data
      title: Load sample data from FOCUS-3D

    - id: focus-3d.make_segmentation_widget
      python_name: focus3d._widget:SegmentationWidget
      title: Open FOCUS-3D Segmentation Widget

    - id: focus-3d.make_tracking_widget
      python_name: focus3d._widget:TrackingWidget
      title: Open FOCUS-3D Tracking Widget

  readers:
    - command: focus-3d.get_reader
      accepts_directories: false
      filename_patterns: ['*.npy']

  writers:
    - command: focus-3d.write_multiple
      layer_types: ['image*', 'labels*']
      filename_extensions: []

    - command: focus-3d.write_single_image
      layer_types: ['image']
      filename_extensions: ['.npy']

  sample_data:
    - command: focus-3d.make_sample_data
      display_name: FOCUS-3D
      key: unique_id.1

  widgets:
    - command: focus-3d.make_segmentation_widget
      display_name: 3D Segmentation