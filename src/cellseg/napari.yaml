name: cellseg
display_name: Cellseg
# use 'hidden' to remove plugin from napari hub search results
visibility: public
# see https://napari.org/stable/plugins/technical_references/manifest.html#fields for valid categories
# categories: []
contributions:
  commands:
    - id: cellseg.get_reader
      python_name: cellseg._reader:napari_get_reader
      title: Open data with Cellseg
    - id: cellseg.write_multiple
      python_name: cellseg._writer:write_multiple
      title: Save multi-layer data with Cellseg
    - id: cellseg.write_single_image
      python_name: cellseg._writer:write_single_image
      title: Save image data with Cellseg
    - id: cellseg.make_sample_data
      python_name: cellseg._sample_data:make_sample_data
      title: Load sample data from Cellseg
    - id: cellseg.make_container_widget
      python_name: cellseg:ImageThreshold
      title: Make threshold Container widget
    - id: cellseg.make_magic_widget
      python_name: cellseg:threshold_magic_widget
      title: Make threshold magic widget
    - id: cellseg.make_function_widget
      python_name: cellseg:threshold_autogenerate_widget
      title: Make threshold function widget
    - id: cellseg.make_qwidget
      python_name: cellseg:ExampleQWidget
      title: Make example QWidget
  readers:
    - command: cellseg.get_reader
      accepts_directories: false
      filename_patterns: ['*.npy']
  writers:
    - command: cellseg.write_multiple
      layer_types: ['image*','labels*']
      filename_extensions: []
    - command: cellseg.write_single_image
      layer_types: ['image']
      filename_extensions: ['.npy']
  sample_data:
    - command: cellseg.make_sample_data
      display_name: Cellseg
      key: unique_id.1
  widgets:
    - command: cellseg.make_container_widget
      display_name: Container Threshold
    - command: cellseg.make_magic_widget
      display_name: Magic Threshold
    - command: cellseg.make_function_widget
      autogenerate: true
      display_name: Autogenerate Threshold
    - command: cellseg.make_qwidget
      display_name: Example QWidget
  menus:
    napari/layers/segment:
      - command: cellseg.make_container_widget
      - command: cellseg.make_magic_widget
      - command: cellseg.make_function_widget
      - command: cellseg.make_qwidget
